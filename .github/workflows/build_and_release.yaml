name: Build Aseprite (Custom Branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Aseprite 源码分支或标签（如 main, v1.3-beta1）'
        required: true
        default: 'main'
      build_type:
        description: '编译类型 (Release 或 Debug)'
        required: true
        default: 'Release'

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type }}

jobs:
  build-aseprite:
    name: Build Aseprite
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone Aseprite source
        shell: bash
        run: |
          git clone --recurse-submodules -j8 https://github.com/aseprite/aseprite --branch ${{ github.event.inputs.branch }} aseprite

      - name: Download Skia for Windows
        working-directory: aseprite
        shell: bash
        run: |
          choco install wget -y --no-progress
          wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
          unzip Skia-Windows-Release-x64.zip -d skia

      - uses: aseprite/get-ninja@main

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Makefiles
        shell: bash
        working-directory: aseprite
        run: |
          export enable_ccache=off
          export laf_backend=skia
          export enable_scripting=on
          export skia_arch=x64

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=$(realpath skia) \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch)

      - name: Compile with Ninja
        shell: bash
        working-directory: aseprite
        run: |
          cd build && ninja

      - name: Clean up build output
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          find . -mindepth 1 ! \( -name 'aseprite.exe' -o -name 'data' -prune \) -exec rm -rf {} +

      - name: Create portable marker
        working-directory: aseprite/build/bin
        shell: bash
        run: echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini

      # 使用 PowerShell 打包（更可靠），并输出文件列表用于调试
      - name: Package artifacts
        working-directory: aseprite/build/bin
        shell: powershell
        run: |
          $zipName = "Aseprite-${{ github.event.inputs.branch }}-${{ env.BUILD_TYPE }}-Windows.zip"
          Compress-Archive -Path * -DestinationPath $zipName -CompressionLevel Optimal
          Write-Host "Created: $zipName"
          Get-ChildItem -Filter "*.zip"

      # 上传时直接指定准确的文件名（不使用通配符）
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aseprite/build/bin/Aseprite-${{ github.event.inputs.branch }}-${{ env.BUILD_TYPE }}-Windows.zip
          asset_name: Aseprite-${{ github.event.inputs.branch }}-${{ env.BUILD_TYPE }}-Windows.zip
          tag: ${{ github.event.inputs.branch }}-${{ github.run_number }}
          release_name: "Aseprite build from ${{ github.event.inputs.branch }} (run #${{ github.run_number }})"
          body: |
            自动构建的测试版 Aseprite
            - 分支/标签: ${{ github.event.inputs.branch }}
            - 构建类型: ${{ env.BUILD_TYPE }}
            - 触发时间: ${{ github.event.repository.updated_at }}
          overwrite: false
