name: Build Aseprite (Official Release Source)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '官方 Release 标签（如 v1.3.18-beta3, v1.3.17）'
        required: true
        default: 'v1.3.18-beta3'
      build_type:
        description: '编译类型 (Release 或 Debug)'
        required: true
        default: 'Release'

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type }}
  ASE_TAG: ${{ github.event.inputs.tag }}

jobs:
  build-aseprite:
    name: Build Aseprite
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 1. 下载官方 Release 源码包（PowerShell）
      - name: Download source code for tag
        shell: powershell
        run: |
          $url = "https://github.com/aseprite/aseprite/archive/refs/tags/${{ env.ASE_TAG }}.zip"
          $zipPath = "aseprite-src.zip"
          Write-Host "Downloading $url ..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Write-Host "Extracting ..."
          Expand-Archive -Path $zipPath -DestinationPath .
          # 解压后的目录名类似 aseprite-1.3.18-beta3，将其重命名为 aseprite
          $srcDir = Get-ChildItem -Directory -Filter "aseprite-*" | Select-Object -First 1
          Rename-Item -Path $srcDir.FullName -NewName "aseprite"
          # 进入目录并初始化子模块
          cd aseprite
          git init
          git submodule update --init --recursive

      # 2. 下载 Skia（Windows 版本，使用 PowerShell）
      - name: Download Skia for Windows
        working-directory: aseprite
        shell: powershell
        run: |
          $url = "https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip"
          $zipPath = "Skia-Windows-Release-x64.zip"
          Write-Host "Downloading Skia ..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Write-Host "Extracting Skia to skia/ ..."
          Expand-Archive -Path $zipPath -DestinationPath skia

      # 3. 安装 Ninja
      - uses: aseprite/get-ninja@main

      # 4. 设置 MSVC 环境
      - uses: ilammy/msvc-dev-cmd@v1

      # 5. 生成 CMake 构建文件
      - name: Generate Makefiles
        shell: bash
        working-directory: aseprite
        run: |
          export enable_ccache=off
          export laf_backend=skia
          export enable_scripting=on
          export skia_arch=x64

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=$(realpath skia) \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch)

      # 6. 编译
      - name: Compile with Ninja
        shell: bash
        working-directory: aseprite
        run: |
          cd build && ninja

      # 7. 清理构建输出，只保留可执行文件和 data
      - name: Clean up build output
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          find . -mindepth 1 ! \( -name 'aseprite.exe' -o -name 'data' -prune \) -exec rm -rf {} +

      # 8. 创建便携标记文件
      - name: Create portable marker
        working-directory: aseprite/build/bin
        shell: bash
        run: echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini

      # 9. 打包成 zip（使用 PowerShell）
      - name: Package artifacts
        working-directory: aseprite/build/bin
        shell: powershell
        run: |
          $zipName = "Aseprite-${{ env.ASE_TAG }}-${{ env.BUILD_TYPE }}-Windows.zip"
          Compress-Archive -Path * -DestinationPath $zipName -CompressionLevel Optimal
          Write-Host "Created: $zipName"
          Get-ChildItem -Filter "*.zip"

      # 10. 上传到 Release
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aseprite/build/bin/Aseprite-${{ env.ASE_TAG }}-${{ env.BUILD_TYPE }}-Windows.zip
          asset_name: Aseprite-${{ env.ASE_TAG }}-${{ env.BUILD_TYPE }}-Windows.zip
          tag: ${{ env.ASE_TAG }}-${{ github.run_number }}
          release_name: "Aseprite ${{ env.ASE_TAG }} (${{ env.BUILD_TYPE }}) build #${{ github.run_number }}"
          body: |
            从官方 Release 源码构建的 Aseprite
            - 版本: ${{ env.ASE_TAG }}
            - 构建类型: ${{ env.BUILD_TYPE }}
            - 构建时间: ${{ github.event.repository.updated_at }}
          overwrite: false
